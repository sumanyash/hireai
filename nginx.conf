server {
    listen 80;
    server_name hire.clouddialer.in;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name hire.clouddialer.in;

    ssl_certificate /etc/letsencrypt/live/hire.clouddialer.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hire.clouddialer.in/privkey.pem;

    root /var/www/hire;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht { deny all; }

    # Webhook endpoint for ElevenLabs
    location /api/interview.php {
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }
}
